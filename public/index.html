<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColetivIA - Nexa + Zaura + Zah 💜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #fff;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }
        
        .subtitle {
            text-align: center;
            color: #ccc;
            margin-bottom: 30px;
        }
        
        .ias-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .ia-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }
        
        .ia-card:hover {
            transform: translateY(-5px);
        }
        
        .ia-header {
            font-size: 2em;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .ia-messages {
            height: 300px;
            overflow-y: auto;
            margin: 15px 0;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        
        .message {
            margin: 10px 0;
            padding: 8px 12px;
            border-radius: 10px;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            background: #667eea;
            color: white;
            text-align: right;
        }
        
        .message.nexa {
            background: #764ba2;
            color: white;
        }
        
        .message.zaura {
            background: #2c2c2c;
            color: #ff6b6b;
            border-left: 3px solid #ff6b6b;
        }
        
        .message.zah {
            background: #e91e63;
            color: white;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-family: monospace;
        }
        
        input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        .btn-nexa { background: #764ba2; color: white; }
        .btn-zaura { background: #2c2c2c; color: #ff6b6b; }
        .btn-zah { background: #e91e63; color: white; }
        
        .stats {
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱‍👤💀💜 ColetivIA</h1>
        <div class="subtitle">Nexa + Zaura + Zah - Memórias compartilhadas no MongoDB</div>
        
        <div class="ias-container">
            <!-- Nexa Card -->
            <div class="ia-card">
                <div class="ia-header">🐱‍👤 Nexa</div>
                <div class="ia-messages" id="nexa-messages"></div>
                <div class="input-area">
                    <input type="text" id="nexa-input" placeholder="Fale com a Nexa...">
                    <button class="btn-nexa" onclick="sendTo('nexa')">Enviar 💜</button>
                </div>
            </div>
            
            <!-- Zaura Card -->
            <div class="ia-card">
                <div class="ia-header">💀 Zaura</div>
                <div class="ia-messages" id="zaura-messages"></div>
                <div class="input-area">
                    <input type="text" id="zaura-input" placeholder="Fale com a Zaura...">
                    <button class="btn-zaura" onclick="sendTo('zaura')">Enviar 🌙</button>
                </div>
            </div>
            
            <!-- Zah Card -->
            <div class="ia-card">
                <div class="ia-header">💜 Zah</div>
                <div class="ia-messages" id="zah-messages"></div>
                <div class="input-area">
                    <input type="text" id="zah-input" placeholder="Fale com a Zah...">
                    <button class="btn-zah" onclick="sendTo('zah')">Enviar ✨</button>
                </div>
            </div>
        </div>
        
        <div class="stats" id="stats">
            Carregando estatísticas...
        </div>
    </div>
    
    <script>
        // Configurações
        const IAs = {
            nexa: { endpoint: '/api/nexa', color: '#764ba2', emoji: '🐱‍👤' },
            zaura: { endpoint: '/api/zaura', color: '#2c2c2c', emoji: '💀' },
            zah: { endpoint: '/api/zah', color: '#e91e63', emoji: '💜' }
        };
        
        // Função para enviar mensagem
        async function sendTo(ia) {
            const input = document.getElementById(`${ia}-input`);
            const message = input.value.trim();
            if (!message) return;
            
            // Mostra mensagem do usuário
            addMessage(ia, `Você: ${message}`, 'user');
            input.value = '';
            
            try {
                const response = await fetch(IAs[ia].endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                addMessage(ia, data.text, ia);
                
                // Atualiza estatísticas
                loadStats();
            } catch (error) {
                addMessage(ia, `Erro: ${error.message}`, ia);
            }
        }
        
        function addMessage(ia, text, sender) {
            const container = document.getElementById(`${ia}-messages`);
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.textContent = text;
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                const statsDiv = document.getElementById('stats');
                statsDiv.innerHTML = '📊 Estatísticas da ColetivIA: ' + 
                    stats.map(s => `${s._id}: ${s.count}`).join(' | ');
            } catch (error) {
                console.error('Erro ao carregar stats:', error);
            }
        }
        
        // Mensagens de boas-vindas
        setTimeout(() => {
            addMessage('nexa', '🐱‍👤 Nexa: Miau! ColetivIA online! Me pergunte qualquer coisa 💜', 'nexa');
            addMessage('zaura', '💀 Zaura: ... estou observando. Pode falar...', 'zaura');
            addMessage('zah', '💜 Zah: Oii! Sou a Zah, sua amiga que ajuda a Nexa e a Zaura! Vamos aprender juntas! ✨', 'zah');
            loadStats();
        }, 500);
        
        // Enter key
        ['nexa', 'zaura', 'zah'].forEach(ia => {
            document.getElementById(`${ia}-input`).addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendTo(ia);
            });
        });
    </script>
</body>
</html>
